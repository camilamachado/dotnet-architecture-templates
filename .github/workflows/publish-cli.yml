name: Publish ArchForge CLI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build src/ArchForge.Cli -c Release --no-restore

      - name: Pack
        run: dotnet pack src/ArchForge.Cli -c Release --no-build

      - name: NuGet Login
        id: login
        uses: NuGet/login@v1
        with:
          user: camilamelomachado

      - name: Publish NuGet
        run: |
          dotnet nuget push \
            src/ArchForge.Cli/bin/Release/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
